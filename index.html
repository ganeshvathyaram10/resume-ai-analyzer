<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Resume AI Analyzer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      min-height: 100vh;
      padding: 40px 20px;
    }

    h1 {
      text-align: center;
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 36px;
      font-size: 15px;
    }

    .container {
      max-width: 860px;
      margin: 0 auto;
    }

    .inputs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    @media (max-width: 600px) {
      .inputs { grid-template-columns: 1fr; }
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 8px;
      color: #444;
    }

    textarea {
      width: 100%;
      height: 220px;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 14px;
      font-size: 14px;
      font-family: inherit;
      resize: vertical;
      background: white;
      transition: border 0.2s;
    }

    textarea:focus {
      outline: none;
      border-color: #6366f1;
    }

    button {
      display: block;
      width: 100%;
      padding: 14px;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #4f46e5; }
    button:disabled { background: #a5b4fc; cursor: not-allowed; }

    .results {
      margin-top: 32px;
      display: none;
    }

    .score-card {
      background: white;
      border-radius: 14px;
      padding: 28px;
      text-align: center;
      margin-bottom: 20px;
      border: 1px solid #e5e7eb;
    }

    .score-number {
      font-size: 64px;
      font-weight: 700;
      line-height: 1;
    }

    .score-label {
      font-size: 14px;
      color: #666;
      margin-top: 6px;
    }

    .cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    @media (max-width: 600px) {
      .cards { grid-template-columns: 1fr; }
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      border: 1px solid #e5e7eb;
    }

    .card h3 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #374151;
    }

    .card ul {
      list-style: none;
      padding: 0;
    }

    .card ul li {
      font-size: 14px;
      padding: 6px 0;
      border-bottom: 1px solid #f3f4f6;
      color: #4b5563;
      line-height: 1.5;
    }

    .card ul li:last-child { border-bottom: none; }

    .strengths li::before { content: "✅ "; }
    .missing li::before  { content: "❌ "; }
    .bullets li::before  { content: "✏️ "; }

    .summary-card {
      background: #eef2ff;
      border-radius: 12px;
      padding: 18px 20px;
      font-size: 14px;
      color: #3730a3;
      border: 1px solid #c7d2fe;
      line-height: 1.6;
    }

    .error {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #b91c1c;
      padding: 14px;
      border-radius: 10px;
      margin-top: 20px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🤖 Resume AI Analyzer</h1>
    <p class="subtitle">Paste your resume and a job description to get an instant match analysis</p>

    <div class="inputs">
      <div>
        <label>Your Resume</label>
        <textarea id="resume" placeholder="Paste your resume here..."></textarea>
      </div>
      <div>
        <label>Job Description</label>
        <textarea id="job" placeholder="Paste the job description here..."></textarea>
      </div>
    </div>

    <button id="analyzeBtn" onclick="analyze()">Analyze Match ✨</button>

    <div id="error" class="error" style="display:none"></div>

    <div class="results" id="results">
      <div class="score-card">
        <div class="score-number" id="scoreNumber">--</div>
        <div class="score-label">Match Score out of 100</div>
      </div>

      <div class="cards">
        <div class="card">
          <h3>✅ Strengths</h3>
          <ul class="strengths" id="strengths"></ul>
        </div>
        <div class="card">
          <h3>❌ Missing Skills</h3>
          <ul class="missing" id="missing"></ul>
        </div>
      </div>

      <div class="card" style="margin-bottom: 16px">
        <h3>✏️ Improved Bullet Points</h3>
        <ul class="bullets" id="bullets"></ul>
      </div>

      <div class="summary-card" id="summary"></div>
    </div>
  </div>

  <script>
    async function analyze() {
      const resume = document.getElementById("resume").value.trim();
      const job = document.getElementById("job").value.trim();
      const btn = document.getElementById("analyzeBtn");
      const errorDiv = document.getElementById("error");

      errorDiv.style.display = "none";

      if (!resume || !job) {
        errorDiv.textContent = "Please fill in both fields.";
        errorDiv.style.display = "block";
        return;
      }

      btn.disabled = true;
      btn.textContent = "Analyzing... ⏳";

      try {
        const response = await fetch("https://your-railway-url.up.railway.app/analyze", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ resume, job_description: job })
        });

        const data = await response.json();

        const score = data.match_score;
        const scoreEl = document.getElementById("scoreNumber");
        scoreEl.textContent = score;
        scoreEl.style.color = score >= 70 ? "#16a34a" : score >= 40 ? "#d97706" : "#dc2626";

        const toList = (id, items) => {
          document.getElementById(id).innerHTML = items.map(i => `<li>${i}</li>`).join("");
        };

        toList("strengths", data.strengths);
        toList("missing", data.missing_skills);
        toList("bullets", data.improved_bullets);
        document.getElementById("summary").textContent = data.summary;
        document.getElementById("results").style.display = "block";

      } catch (err) {
        errorDiv.textContent = "Something went wrong. Make sure your backend is running with: uvicorn main:app --reload";
        errorDiv.style.display = "block";
      }

      btn.disabled = false;
      btn.textContent = "Analyze Match ✨";
    }
  </script>
</body>
</html>
